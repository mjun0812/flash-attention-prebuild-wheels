name: "Build and Upload Flash Attention Wheels"
description: "Build, test, and upload Flash Attention wheels with optional manylinux support"

inputs:
  flash-attn-version:
    description: "Flash-Attention version"
    required: true
  python-version:
    description: "Python version"
    required: true
  torch-version:
    description: "PyTorch version"
    required: true
  cuda-version:
    description: "CUDA version"
    required: true
  is-upload:
    description: "Whether to upload the release asset"
    required: false
    default: "true"
  cleanup:
    description: "Whether to clean up Python installation"
    required: false
    default: "false"
  use-build-cache:
    description: "Whether to cache the ninja build directory across retries and cap builds before GitHub's hard 6h job cancel."
    required: false
    default: "false"
  build-timeout-minutes:
    description: "Minutes from job start until the build is capped so the warm cache can still be validated, compressed, and uploaded (only used with use-build-cache)."
    required: false
    default: "330"

outputs:
  wheel-path:
    description: "Path to the built wheel"
    value: ${{ steps.build_wheels.outputs.WHEEL_PATH }}
  wheel-path-manylinux:
    description: "Path to the manylinux wheel"
    value: ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install Python
      shell: bash
      run: |
        uv venv -p ${{ inputs.python-version }} --python-preference only-managed
        uv pip install -U pip setuptools==75.8.0 wheel packaging psutil auditwheel
        current_dir=$(pwd)
        echo "$current_dir/.venv/bin" >> $GITHUB_PATH

    - name: Setup CUDA
      uses: mjun0812/setup-cuda@v1.3.0
      with:
        version: ${{ inputs.cuda-version }}

    # ninja build directory cache so the next attempt resumes from the
    # already-compiled .o files. See memory/project_build_cache_ninja_mtime.md
    # for why ccache was unsuitable and how the mtime juggling works.
    #
    # The key ties the cache to this exact workflow run (run_id) plus a
    # toolchain/script fingerprint, so a rerun only ever restores what an
    # earlier attempt of the same run saved. Each attempt saves under its own
    # immutable key; the restore prefix drops only the attempt suffix.
    - name: Compute build cache key
      id: cache_meta
      if: ${{ inputs.use-build-cache == 'true' }}
      shell: bash
      run: |
        case "${{ inputs.flash-attn-version }}" in
          fa3:*) variant=fa3 ;;
          *) variant=fa2 ;;
        esac
        fingerprint=$({
          c++ --version
          nvcc --version
          cat build_linux.sh get_torch_cuda_version.py patches/fa3/setup_linux.py \
            scripts/tools/truncate_build_cache_mtimes.py \
            scripts/tools/validate_build_cache.py
        } | sha256sum | cut -c1-16)
        base="fa-build-cache-linux-${{ runner.arch }}-${variant}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-${fingerprint}-${{ github.run_id }}"
        echo "key=${base}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
        echo "restore-prefix=${base}-" >> "$GITHUB_OUTPUT"
        echo "Cache key: ${base}-${{ github.run_attempt }}"

    - name: Restore build directory cache
      if: ${{ inputs.use-build-cache == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.fa-build-cache
        key: ${{ steps.cache_meta.outputs.key }}
        restore-keys: |
          ${{ steps.cache_meta.outputs.restore-prefix }}

    - name: Build wheels
      id: build
      shell: bash
      env:
        USE_BUILD_CACHE: ${{ inputs.use-build-cache == 'true' && '1' || '0' }}
        BUILD_TIMEOUT_MINUTES: ${{ inputs.build-timeout-minutes }}
      run: |
        chmod +x build_linux.sh
        if [ "${USE_BUILD_CACHE}" = "1" ]; then
          # Cap the build relative to the job start (GitHub's 6h limit covers
          # the whole job, setup included), leaving headroom to validate,
          # compress, and upload the warm build dir before the hard cancel.
          # BUILD_JOB_STARTED_AT is exported by the first step of the calling
          # workflow; fall back to now if a caller does not set it.
          : "${BUILD_JOB_STARTED_AT:=$(date +%s)}"
          deadline=$((BUILD_JOB_STARTED_AT + BUILD_TIMEOUT_MINUTES * 60))
          remaining=$((deadline - $(date +%s)))
          if [ "${remaining}" -le 60 ]; then
            echo "::error::Less than 60s left before the build deadline; not starting the build."
            exit 1
          fi
          echo "Build deadline in ${remaining}s (${BUILD_TIMEOUT_MINUTES}m from job start)"
          rc=0
          timeout --signal=TERM "${remaining}s" ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}" || rc=$?
          if [ "${rc}" = "124" ]; then
            # Capped: mark so the cache-save steps below run. A completed
            # build (rc=0) or a compile error leaves capped unset, so its
            # cache is NOT saved.
            echo "capped=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Build hit the ${BUILD_TIMEOUT_MINUTES}m cap; build directory will be saved for a warm retry. Marking this attempt as failed."
          fi
          exit "${rc}"
        else
          ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}"
        fi

    # Stage the build dir + cutlass tree under ~/.fa-build-cache/ so
    # actions/cache/save picks them up at a stable path. Only a validated
    # build tree is staged; a corrupt one (e.g. .ninja_deps cut mid-write)
    # is dropped so the rerun starts clean instead of building a broken wheel.
    - name: Stage build directory for cache save
      id: stage_build
      if: ${{ always() && inputs.use-build-cache == 'true' && steps.build.outputs.capped == 'true' }}
      shell: bash
      run: |
        case "${{ inputs.flash-attn-version }}" in
          fa3:*) src=flash-attention/hopper/build ;;
          *) src=flash-attention/build ;;
        esac
        echo "staged=false" >> "$GITHUB_OUTPUT"
        if [ ! -d "$src" ]; then
          echo "No build directory found at $src; skipping cache save."
          exit 0
        fi
        if ! python3 "$GITHUB_WORKSPACE/scripts/tools/validate_build_cache.py" "$src"; then
          echo "::warning::Build directory failed validation; skipping cache save."
          exit 0
        fi
        mkdir -p "$HOME/.fa-build-cache"
        rm -rf "$HOME/.fa-build-cache/build" "$HOME/.fa-build-cache/cutlass"
        mv "$src" "$HOME/.fa-build-cache/build"
        echo "Staged $src -> ~/.fa-build-cache/build"
        du -sh "$HOME/.fa-build-cache/build" || true
        # Truncate mtimes to whole seconds so they survive GNU tar in
        # actions/cache@v4 (ustar drops sub-second precision). Exits non-zero
        # on a corrupt .ninja_deps, in which case the save is skipped.
        if ! python3 "$GITHUB_WORKSPACE/scripts/tools/truncate_build_cache_mtimes.py" \
          "$HOME/.fa-build-cache"; then
          echo "::warning::mtime truncation failed; skipping cache save."
          exit 0
        fi
        echo "staged=true" >> "$GITHUB_OUTPUT"

    - name: Save build directory cache (only when capped)
      if: ${{ always() && inputs.use-build-cache == 'true' && steps.build.outputs.capped == 'true' && steps.stage_build.outputs.staged == 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ~/.fa-build-cache
        key: ${{ steps.cache_meta.outputs.key }}

    - name: Locate wheel
      id: build_wheels
      shell: bash
      run: |
        if [[ "${{ inputs.flash-attn-version }}" == fa3:* ]]; then
          wheel_path=$(ls flash-attention/hopper/dist/*.whl | head -n 1)
          echo "IS_FA3=true" >> $GITHUB_OUTPUT
        else
          wheel_path=$(ls flash-attention/dist/*.whl | head -n 1)
          echo "IS_FA3=false" >> $GITHUB_OUTPUT
        fi
        echo "WHEEL_PATH=$wheel_path" >> $GITHUB_OUTPUT

    - name: Install Test
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          pip uninstall -y flash-attn-3 > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
        else
          pip uninstall -y flash-attn > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn; print(flash_attn.__version__)"
        fi

    - name: Upload Release Asset
      if: ${{ inputs.is-upload == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path="${{ steps.build_wheels.outputs.WHEEL_PATH }}"
        # Check if the file exists
        if [ ! -f "$wheel_path" ]; then
          echo "Error: Wheel file not found at $wheel_path"
          exit 1
        fi
        # Upload the release asset using GitHub CLI
        gh release upload "$tag_name" "$wheel_path" --clobber

    - name: Apply auditwheel repair
      continue-on-error: true
      id: auditwheel_repair
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          DIST_MANYLINUX_DIR="flash-attention/hopper/dist_manylinux"
        else
          DIST_MANYLINUX_DIR="flash-attention/dist_manylinux"
        fi
        auditwheel show ${{ steps.build_wheels.outputs.WHEEL_PATH }}
        auditwheel repair \
          --exclude libc10* --exclude libtorch* --exclude libcu* --exclude libnv* --exclude 'libtorch*' \
          ${{ steps.build_wheels.outputs.WHEEL_PATH }} -w "$DIST_MANYLINUX_DIR"
        wheel_path_manylinux=$(ls "$DIST_MANYLINUX_DIR"/*manylinux*.whl 2>/dev/null | head -n 1 || echo "")
        echo "WHEEL_PATH_MANYLINUX=$wheel_path_manylinux" >> $GITHUB_OUTPUT

    - name: Test manylinux wheel
      continue-on-error: true
      shell: bash
      run: |
        if [ -n "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ] && [ -f "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ]; then
          if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
            pip uninstall -y flash-attn-3 > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
          else
            pip uninstall -y flash-attn > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn; print(flash_attn.__version__)"
          fi
        fi

    - name: Upload manylinux wheel
      if: ${{ inputs.is-upload == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path_manylinux="${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}"
        if [ -n "$wheel_path_manylinux" ] && [ -f "$wheel_path_manylinux" ]; then
          # Upload the release asset using GitHub CLI
          gh release upload "$tag_name" "$wheel_path_manylinux" --clobber
        else
          echo "Skipping manylinux wheel upload: file not found"
        fi

    - name: Clean up
      if: ${{ inputs.cleanup == 'true' }}
      shell: bash
      run: |
        rm -rf /opt/hostedtoolcache/Python
