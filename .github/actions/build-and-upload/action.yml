name: "Build and Upload Flash Attention Wheels"
description: "Build, test, and upload Flash Attention wheels with optional manylinux support"

inputs:
  flash-attn-version:
    description: "Flash-Attention version"
    required: true
  python-version:
    description: "Python version"
    required: true
  torch-version:
    description: "PyTorch version"
    required: true
  cuda-version:
    description: "CUDA version"
    required: true
  is-upload:
    description: "Whether to upload the release asset"
    required: false
    default: "true"
  cleanup:
    description: "Whether to clean up Python installation"
    required: false
    default: "false"
  use-build-cache:
    description: "Whether to cache the ninja build directory across retries and cap builds at 5h45m so the warm cache survives a hard 6h cancel."
    required: false
    default: "false"

outputs:
  wheel-path:
    description: "Path to the built wheel"
    value: ${{ steps.build_wheels.outputs.WHEEL_PATH }}
  wheel-path-manylinux:
    description: "Path to the manylinux wheel"
    value: ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python
      shell: bash
      run: |
        uv venv -p ${{ inputs.python-version }} --python-preference only-managed
        uv pip install -U pip setuptools==75.8.0 wheel packaging psutil auditwheel
        current_dir=$(pwd)
        echo "$current_dir/.venv/bin" >> $GITHUB_PATH

    - name: Setup CUDA
      uses: mjun0812/setup-cuda@v1.3.0
      with:
        version: ${{ inputs.cuda-version }}

    # ninja build directory cache. Stores the entire
    # flash-attention/hopper/build/ tree under ~/.fa-build-cache/ so ninja
    # sees the .o files on the next attempt and skips already-compiled
    # translation units. (ccache was attempted previously but FA3's nvcc
    # invocations are 97% 'uncacheable' from ccache's perspective due to
    # --generate-dependencies-with-compile.)
    - name: Restore FA3 build directory cache
      id: build_cache_restore
      if: ${{ inputs.use-build-cache == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.fa-build-cache
        # fabuild3- prefix: cache layout changed again (mtimes are now
        # truncated to whole seconds before save so they survive GNU tar's
        # ustar precision loss in actions/cache@v4). Older fabuild2- caches
        # carry nanosecond mtimes that no longer match ninja's expectations.
        key: fabuild3-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          fabuild3-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-

    - name: Build wheels
      id: build
      shell: bash
      env:
        USE_BUILD_CACHE: ${{ inputs.use-build-cache == 'true' && '1' || '0' }}
      run: |
        chmod +x build_linux.sh
        if [ "${USE_BUILD_CACHE}" = "1" ]; then
          # DEBUG: temporarily capped at 60m to diagnose ninja rebuild reasons.
          # Original cap is 5h45m (= 345m). Restore after debug.
          rc=0
          timeout --signal=TERM 60m ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}" || rc=$?
          if [ "${rc}" = "124" ]; then
            echo "capped=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Build hit the 60m debug cap."
          fi
          exit "${rc}"
        else
          ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}"
        fi

    # Move the partially-built ninja directory under ~/.fa-build-cache/ so
    # actions/cache/save can pick it up at a stable path. Also stash the
    # cutlass/cute header tree so its mtimes survive a restore — ninja
    # records header mtimes in .ninja_deps and matches them on the next run.
    - name: Stage FA3 build directory for cache save
      id: stage_build
      if: ${{ always() && inputs.use-build-cache == 'true' && steps.build.outputs.capped == 'true' }}
      shell: bash
      run: |
        src=""
        if [ -d flash-attention/hopper/build ]; then
          src=flash-attention/hopper/build
        elif [ -d flash-attention/build ]; then
          src=flash-attention/build
        fi
        if [ -n "$src" ]; then
          mkdir -p "$HOME/.fa-build-cache"
          rm -rf "$HOME/.fa-build-cache/build" "$HOME/.fa-build-cache/cutlass"
          mv "$src" "$HOME/.fa-build-cache/build"
          echo "Staged $src -> ~/.fa-build-cache/build"
          du -sh "$HOME/.fa-build-cache/build" || true
          if [ -d flash-attention/csrc/cutlass ]; then
            # cp -a preserves mtime; mv would be faster but git checkout
            # would have to recreate the tree for any post-build step.
            cp -a flash-attention/csrc/cutlass "$HOME/.fa-build-cache/cutlass"
            echo "Staged cutlass -> ~/.fa-build-cache/cutlass"
            du -sh "$HOME/.fa-build-cache/cutlass" || true
          fi
          # actions/cache@v4 archives via GNU tar (ustar), which truncates
          # mtimes to whole seconds. ninja .ninja_deps records mtimes at
          # nanosecond precision, so after restore the stat() values (sec.0)
          # mismatch what was recorded (sec.NNN) and ninja rebuilds every
          # .o. Truncate both sides now so the comparison still holds.
          python3 "$GITHUB_WORKSPACE/scripts/tools/truncate_build_cache_mtimes.py" \
            "$HOME/.fa-build-cache" || true
          echo "staged=true" >> "$GITHUB_OUTPUT"
        else
          echo "No build directory found to stage; skipping cache save."
          echo "staged=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Save FA3 build directory cache (only when capped)
      if: ${{ always() && inputs.use-build-cache == 'true' && steps.build.outputs.capped == 'true' && steps.stage_build.outputs.staged == 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ~/.fa-build-cache
        key: ${{ steps.build_cache_restore.outputs.cache-primary-key }}

    - name: Locate wheel
      id: build_wheels
      shell: bash
      run: |
        if [[ "${{ inputs.flash-attn-version }}" == fa3:* ]]; then
          wheel_path=$(ls flash-attention/hopper/dist/*.whl | head -n 1)
          echo "IS_FA3=true" >> $GITHUB_OUTPUT
        else
          wheel_path=$(ls flash-attention/dist/*.whl | head -n 1)
          echo "IS_FA3=false" >> $GITHUB_OUTPUT
        fi
        echo "WHEEL_PATH=$wheel_path" >> $GITHUB_OUTPUT

    - name: Install Test
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          pip uninstall -y flash-attn-3 > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
        else
          pip uninstall -y flash-attn > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn; print(flash_attn.__version__)"
        fi

    - name: Upload Release Asset
      if: ${{ inputs.is-upload == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path="${{ steps.build_wheels.outputs.WHEEL_PATH }}"
        # Check if the file exists
        if [ ! -f "$wheel_path" ]; then
          echo "Error: Wheel file not found at $wheel_path"
          exit 1
        fi
        # Upload the release asset using GitHub CLI
        gh release upload "$tag_name" "$wheel_path" --clobber

    - name: Apply auditwheel repair
      continue-on-error: true
      id: auditwheel_repair
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          DIST_MANYLINUX_DIR="flash-attention/hopper/dist_manylinux"
        else
          DIST_MANYLINUX_DIR="flash-attention/dist_manylinux"
        fi
        auditwheel show ${{ steps.build_wheels.outputs.WHEEL_PATH }}
        auditwheel repair \
          --exclude libc10* --exclude libtorch* --exclude libcu* --exclude libnv* --exclude 'libtorch*' \
          ${{ steps.build_wheels.outputs.WHEEL_PATH }} -w "$DIST_MANYLINUX_DIR"
        wheel_path_manylinux=$(ls "$DIST_MANYLINUX_DIR"/*manylinux*.whl 2>/dev/null | head -n 1 || echo "")
        echo "WHEEL_PATH_MANYLINUX=$wheel_path_manylinux" >> $GITHUB_OUTPUT

    - name: Test manylinux wheel
      continue-on-error: true
      shell: bash
      run: |
        if [ -n "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ] && [ -f "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ]; then
          if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
            pip uninstall -y flash-attn-3 > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
          else
            pip uninstall -y flash-attn > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn; print(flash_attn.__version__)"
          fi
        fi

    - name: Upload manylinux wheel
      if: ${{ inputs.is-upload == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path_manylinux="${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}"
        if [ -n "$wheel_path_manylinux" ] && [ -f "$wheel_path_manylinux" ]; then
          # Upload the release asset using GitHub CLI
          gh release upload "$tag_name" "$wheel_path_manylinux" --clobber
        else
          echo "Skipping manylinux wheel upload: file not found"
        fi

    - name: Clean up
      if: ${{ inputs.cleanup == 'true' }}
      shell: bash
      run: |
        rm -rf /opt/hostedtoolcache/Python
