name: "Build and Upload Flash Attention Wheels"
description: "Build, test, and upload Flash Attention wheels with optional manylinux support"

inputs:
  flash-attn-version:
    description: "Flash-Attention version"
    required: true
  python-version:
    description: "Python version"
    required: true
  torch-version:
    description: "PyTorch version"
    required: true
  cuda-version:
    description: "CUDA version"
    required: true
  is-upload:
    description: "Whether to upload the release asset"
    required: false
    default: "true"
  cleanup:
    description: "Whether to clean up Python installation"
    required: false
    default: "false"
  use-ccache:
    description: "Whether to use ccache to speed up compilation"
    required: false
    default: "false"

outputs:
  wheel-path:
    description: "Path to the built wheel"
    value: ${{ steps.build_wheels.outputs.WHEEL_PATH }}
  wheel-path-manylinux:
    description: "Path to the manylinux wheel"
    value: ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python
      shell: bash
      run: |
        uv venv -p ${{ inputs.python-version }} --python-preference only-managed
        uv pip install -U pip setuptools==75.8.0 wheel packaging psutil auditwheel
        current_dir=$(pwd)
        echo "$current_dir/.venv/bin" >> $GITHUB_PATH

    - name: Setup CUDA
      uses: mjun0812/setup-cuda@v1.3.0
      with:
        version: ${{ inputs.cuda-version }}

    - name: Install ccache
      if: ${{ inputs.use-ccache == 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache

    # Restore only here. Saving is done by a separate step that runs ONLY when
    # the build was capped at 5h45m (a completed build needs no warm cache).
    - name: Restore ccache
      id: ccache_restore
      if: ${{ inputs.use-ccache == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.ccache
        key: ccache-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          ccache-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-
          ccache-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-

    # ninja build directory cache. Unlike ccache (which keys on per-call
    # hashes), this cache stores the entire flash-attention/hopper/build/
    # tree under ~/.fa-build-cache/ so ninja sees the .o files on the next
    # attempt and skips already-compiled translation units. ccache 4.5.1
    # marks 97% of FA3 nvcc calls 'uncacheable' (--generate-dependencies-with-compile),
    # so build-dir caching is the only reliable way to make retries faster.
    - name: Restore FA3 build directory cache
      id: build_cache_restore
      if: ${{ inputs.use-ccache == 'true' }}
      uses: actions/cache/restore@v4
      with:
        path: ~/.fa-build-cache
        key: fabuild-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-${{ github.run_id }}-${{ github.run_attempt }}
        restore-keys: |
          fabuild-linux-${{ runner.arch }}-cu${{ inputs.cuda-version }}-torch${{ inputs.torch-version }}-py${{ inputs.python-version }}-fa${{ inputs.flash-attn-version }}-

    - name: Build wheels
      id: build
      shell: bash
      env:
        USE_CCACHE: ${{ inputs.use-ccache == 'true' && '1' || '0' }}
      run: |
        chmod +x build_linux.sh
        if [ "${USE_CCACHE}" = "1" ]; then
          # Cap the build at 5h45m. GitHub-hosted jobs are hard-cancelled at
          # 6h, which would skip the cache save and lose the warm caches.
          # Stopping the build ourselves before that lets the caches be saved
          # so a subsequent retry resumes from the warm build directory.
          rc=0
          timeout --signal=TERM 345m ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}" || rc=$?
          if [ "${rc}" = "124" ]; then
            # Capped: mark so the cache-save steps below run. A completed
            # build (rc=0) leaves capped unset, so its cache is NOT saved.
            echo "capped=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Build hit the 5h45m cap; build directory and ccache will be saved for a warm retry. Marking this attempt as failed."
          fi
          exit "${rc}"
        else
          ./build_linux.sh "${{ inputs.flash-attn-version }}" "${{ inputs.python-version }}" "${{ inputs.torch-version }}" "${{ inputs.cuda-version }}"
        fi

    # Move the partially-built ninja directory under ~/.fa-build-cache/ so
    # actions/cache/save can pick it up at a stable path.
    - name: Stage FA3 build directory for cache save
      id: stage_build
      if: ${{ always() && inputs.use-ccache == 'true' && steps.build.outputs.capped == 'true' }}
      shell: bash
      run: |
        src=""
        if [ -d flash-attention/hopper/build ]; then
          src=flash-attention/hopper/build
        elif [ -d flash-attention/build ]; then
          src=flash-attention/build
        fi
        if [ -n "$src" ]; then
          mkdir -p "$HOME/.fa-build-cache"
          rm -rf "$HOME/.fa-build-cache/build"
          mv "$src" "$HOME/.fa-build-cache/build"
          echo "Staged $src -> ~/.fa-build-cache/build"
          du -sh "$HOME/.fa-build-cache/build" || true
          echo "staged=true" >> "$GITHUB_OUTPUT"
        else
          echo "No build directory found to stage; skipping cache save."
          echo "staged=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Save FA3 build directory cache (only when capped)
      if: ${{ always() && inputs.use-ccache == 'true' && steps.build.outputs.capped == 'true' && steps.stage_build.outputs.staged == 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ~/.fa-build-cache
        key: ${{ steps.build_cache_restore.outputs.cache-primary-key }}

    # Save the warm ccache ONLY when the build was capped (not on success).
    # always() lets this run even though the capped build step exited non-zero.
    - name: Save ccache (only when capped)
      if: ${{ always() && inputs.use-ccache == 'true' && steps.build.outputs.capped == 'true' }}
      uses: actions/cache/save@v4
      with:
        path: ~/.ccache
        key: ${{ steps.ccache_restore.outputs.cache-primary-key }}

    - name: Locate wheel
      id: build_wheels
      shell: bash
      run: |
        if [[ "${{ inputs.flash-attn-version }}" == fa3:* ]]; then
          wheel_path=$(ls flash-attention/hopper/dist/*.whl | head -n 1)
          echo "IS_FA3=true" >> $GITHUB_OUTPUT
        else
          wheel_path=$(ls flash-attention/dist/*.whl | head -n 1)
          echo "IS_FA3=false" >> $GITHUB_OUTPUT
        fi
        echo "WHEEL_PATH=$wheel_path" >> $GITHUB_OUTPUT

    - name: Install Test
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          pip uninstall -y flash-attn-3 > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
        else
          pip uninstall -y flash-attn > /dev/null 2>&1
          pip install --no-cache-dir ${{ steps.build_wheels.outputs.WHEEL_PATH }}
          python -c "import flash_attn; print(flash_attn.__version__)"
        fi

    - name: Upload Release Asset
      if: ${{ inputs.is-upload == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path="${{ steps.build_wheels.outputs.WHEEL_PATH }}"
        # Check if the file exists
        if [ ! -f "$wheel_path" ]; then
          echo "Error: Wheel file not found at $wheel_path"
          exit 1
        fi
        # Upload the release asset using GitHub CLI
        gh release upload "$tag_name" "$wheel_path" --clobber

    - name: Apply auditwheel repair
      continue-on-error: true
      id: auditwheel_repair
      shell: bash
      run: |
        if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
          DIST_MANYLINUX_DIR="flash-attention/hopper/dist_manylinux"
        else
          DIST_MANYLINUX_DIR="flash-attention/dist_manylinux"
        fi
        auditwheel show ${{ steps.build_wheels.outputs.WHEEL_PATH }}
        auditwheel repair \
          --exclude libc10* --exclude libtorch* --exclude libcu* --exclude libnv* --exclude 'libtorch*' \
          ${{ steps.build_wheels.outputs.WHEEL_PATH }} -w "$DIST_MANYLINUX_DIR"
        wheel_path_manylinux=$(ls "$DIST_MANYLINUX_DIR"/*manylinux*.whl 2>/dev/null | head -n 1 || echo "")
        echo "WHEEL_PATH_MANYLINUX=$wheel_path_manylinux" >> $GITHUB_OUTPUT

    - name: Test manylinux wheel
      continue-on-error: true
      shell: bash
      run: |
        if [ -n "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ] && [ -f "${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}" ]; then
          if [ "${{ steps.build_wheels.outputs.IS_FA3 }}" = "true" ]; then
            pip uninstall -y flash-attn-3 > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn_3; from importlib.metadata import version; print(version('flash-attn-3'))"
          else
            pip uninstall -y flash-attn > /dev/null 2>&1
            pip install --no-cache-dir ${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}
            python -c "import flash_attn; print(flash_attn.__version__)"
          fi
        fi

    - name: Upload manylinux wheel
      if: ${{ inputs.is-upload == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        tag_name=${{ github.ref_name }}
        wheel_path_manylinux="${{ steps.auditwheel_repair.outputs.WHEEL_PATH_MANYLINUX }}"
        if [ -n "$wheel_path_manylinux" ] && [ -f "$wheel_path_manylinux" ]; then
          # Upload the release asset using GitHub CLI
          gh release upload "$tag_name" "$wheel_path_manylinux" --clobber
        else
          echo "Skipping manylinux wheel upload: file not found"
        fi

    - name: Clean up
      if: ${{ inputs.cleanup == 'true' }}
      shell: bash
      run: |
        rm -rf /opt/hostedtoolcache/Python
