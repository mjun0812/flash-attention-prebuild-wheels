# #########################################################
# Unified test build workflow
#
# Select a platform from the dropdown to trigger a test build.
# All builds set is-upload: false (no release upload).
# #########################################################

name: Test build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Build platform"
        required: true
        type: choice
        options:
          - linux-x64-self-hosted
          - linux-x64-no-container
          - linux-arm64
          - linux-arm64-self-hosted
          - linux-arm64-no-container
          - windows-self-hosted
          - windows-github-hosted
          - windows-codebuild
      flash-attn-version:
        description: "Flash-Attention version"
        required: true
        default: "2.8.3"
        type: string
      python-version:
        description: "Python version"
        required: true
        default: "3.13"
        type: string
      torch-version:
        description: "PyTorch version"
        required: true
        default: "2.9.1"
        type: string
      cuda-version:
        description: "CUDA version"
        required: true
        default: "12.8.1"
        type: string

jobs:
  # #########################################################
  # Linux x86_64 self-hosted runner
  # #########################################################
  linux-x64-self-hosted:
    if: inputs.platform == 'linux-x64-self-hosted'
    uses: ./.github/workflows/_build_linux_self_host.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
      runner: '["self-hosted", "x64"]'
      use-container: true

  # #########################################################
  # Linux x86_64 self-hosted runner (no container)
  # #########################################################
  linux-x64-no-container:
    if: inputs.platform == 'linux-x64-no-container'
    uses: ./.github/workflows/_build_linux_no_container.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
      runner: '["self-hosted", "Linux", "x64"]'

  # #########################################################
  # Linux ARM64 GitHub-hosted runner
  # #########################################################
  linux-arm64:
    if: inputs.platform == 'linux-arm64'
    uses: ./.github/workflows/_build_linux.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
      runner: ubuntu-22.04-arm

  # #########################################################
  # Linux ARM64 self-hosted runner
  # #########################################################
  linux-arm64-self-hosted:
    if: inputs.platform == 'linux-arm64-self-hosted'
    uses: ./.github/workflows/_build_linux_arm_self_host.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
      runner: '["self-hosted-arm"]'
      container-image: "quay.io/pypa/manylinux_2_28_aarch64"

  # #########################################################
  # Linux ARM64 self-hosted runner (no container)
  # #########################################################
  linux-arm64-no-container:
    if: inputs.platform == 'linux-arm64-no-container'
    uses: ./.github/workflows/_build_linux_no_container.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
      runner: '["self-hosted-arm"]'

  # #########################################################
  # Windows x86_64 self-hosted runner
  # #########################################################
  windows-self-hosted:
    if: inputs.platform == 'windows-self-hosted'
    uses: ./.github/workflows/_build_windows_self_host.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false

  # #########################################################
  # Windows x86_64 GitHub-hosted runner
  # #########################################################
  windows-github-hosted:
    if: inputs.platform == 'windows-github-hosted'
    uses: ./.github/workflows/_build_windows.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false

  # #########################################################
  # Windows x86_64 AWS CodeBuild
  # #########################################################
  windows-codebuild:
    if: inputs.platform == 'windows-codebuild'
    uses: ./.github/workflows/_build_windows_code_build.yml
    with:
      flash-attn-version: ${{ inputs.flash-attn-version }}
      python-version: ${{ inputs.python-version }}
      torch-version: ${{ inputs.torch-version }}
      cuda-version: ${{ inputs.cuda-version }}
      is-upload: false
