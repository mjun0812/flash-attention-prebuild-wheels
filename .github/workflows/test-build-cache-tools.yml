# #########################################################
# Unit tests for the resumable build cache tools
# (scripts/tools/truncate_build_cache_mtimes.py,
#  scripts/tools/validate_build_cache.py, build_linux.sh syntax)
# #########################################################

name: Test build cache tools

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ninja for the real deps log integration test
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Check bash syntax
        run: bash -n build_linux.sh

      - name: Run unit tests
        run: python3 -m unittest discover -v
