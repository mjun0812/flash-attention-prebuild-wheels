# #########################################################
# Build wheels with GitHub-hosted runner
# #########################################################

name: "[Linux] Build wheels and upload to GitHub Releases"

on:
  workflow_call:
    inputs:
      flash-attn-version:
        description: "Flash-Attention version"
        required: true
        type: string
      python-version:
        description: "Python version"
        required: true
        type: string
      torch-version:
        description: "PyTorch version"
        required: true
        type: string
      cuda-version:
        description: "CUDA version"
        required: true
        type: string
      runner:
        description: "Runner type"
        required: false
        type: string
        default: "ubuntu-22.04"
      is-upload:
        description: "Whether to upload the release asset"
        required: false
        type: boolean
        default: true
      use-build-cache:
        description: "Whether to cache the ninja build directory across retries"
        required: false
        type: boolean
        default: false
      build-timeout-minutes:
        description: "Minutes from job start until the build is capped so the warm cache can still be saved (only used with use-build-cache)"
        required: false
        type: string
        default: "330"

jobs:
  build_wheels:
    name: Build wheels and Upload (Linux, GitHub hosted runner)
    runs-on: ${{ inputs.runner }}
    # GitHub-hosted jobs are hard-cancelled at 6h; the build cap below is
    # measured from BUILD_JOB_STARTED_AT so setup time counts toward it.
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      TERM: xterm-256color
    steps:
      - name: Record job start time
        run: echo "BUILD_JOB_STARTED_AT=$(date +%s)" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - name: Maximize build space
        run: |
          df -h
          echo "-----------------------------"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Install build dependencies
        run: |
          sudo apt install -y ninja-build clang time patchelf

      - name: Build and upload wheels
        uses: ./.github/actions/build-and-upload
        with:
          flash-attn-version: ${{ inputs.flash-attn-version }}
          python-version: ${{ inputs.python-version }}
          torch-version: ${{ inputs.torch-version }}
          cuda-version: ${{ inputs.cuda-version }}
          is-upload: ${{ inputs.is-upload }}
          use-build-cache: ${{ inputs.use-build-cache }}
          build-timeout-minutes: ${{ inputs.build-timeout-minutes }}
