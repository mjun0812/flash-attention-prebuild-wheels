services:
  runner:
    privileged: true
    restart: always
    env_file:
      - .env
    environment:
      REPOSITORY_URL: https://github.com/mjun0812/flash-attention-prebuild-wheels
      RUNNER_NAME: self-hosted-runner-raspi
      RUNNER_GROUP: default
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GH_RUNNER_VERSION: 2.331.0
    volumes:
      - fa-self:/var/lib/docker

  runner-arm:
    privileged: true
    restart: always
    env_file:
      - .env.arm
    environment:
      REPOSITORY_URL: https://github.com/mjun0812/flash-attention-prebuild-wheels
      RUNNER_NAME: self-hosted-runner-arm-raspi
      RUNNER_GROUP: default
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GH_RUNNER_VERSION: 2.331.0
        PLATFORM: linux/arm64
    volumes:
      - fa-self-arm:/var/lib/docker

volumes:
  fa-self:
  fa-self-arm:
