services:
  runner:
    privileged: true
    restart: always
    env_file:
      - .env
    environment:
      REPOSITORY_URL: https://github.com/mjun0812/flash-attention-prebuild-wheels
      RUNNER_NAME: self-hosted-runner
      RUNNER_GROUP: default
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GH_RUNNER_VERSION: 2.331.0
    volumes:
      - fa-self:/var/lib/docker

volumes:
  fa-self:
